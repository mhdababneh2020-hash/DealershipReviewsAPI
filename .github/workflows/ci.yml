name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore DealershipReviewsAPI.Tests/DealershipReviewsAPI.Tests.csproj

      - name: Build
        run: dotnet build DealershipReviewsAPI.Tests/DealershipReviewsAPI.Tests.csproj --no-restore

      - name: Test
        run: dotnet test DealershipReviewsAPI.Tests/DealershipReviewsAPI.Tests.csproj --no-build --verbosity normal
